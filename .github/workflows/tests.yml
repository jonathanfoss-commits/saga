name: SAGA vakter og agent-tester

# Kjører de nettleserløse suitene på hver push/PR: separasjonsvakten (aldri
# arbeidsgiver-referanser), personvernvakten (aldri forretningsdata i dette
# offentlige repoet) og nattskift-testene. E2E-suitene (Playwright) kjøres
# lokalt før merge – se docs/reality-audit.md.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Vakter + agent-tester
        run: npm run test:ci
